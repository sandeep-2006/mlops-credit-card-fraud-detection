global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8081']

  - job_name: 'transaction-service'
    static_configs:
      - targets: ['transaction-service:8081']

  - job_name: 'fraud-service'
    static_configs:
      - targets: ['fraud-service:8081']
